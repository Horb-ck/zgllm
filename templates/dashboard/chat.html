{% extends "layout.html" %}

{% block title %}学情分析{% endblock %}

{% block content %}
<div class="dashboard-container">
    <!-- 侧边导航栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            
            <h2 class="hh">
                <img src="/static/img/logo.svg" alt="a" style="width:40px; height: 40px; margin-right: 16px;">
                <div style="text-align: left"><span style="font-size: 0.8em;">明月科创</span><br>教育大模型</div></h2>
        </div>
        
        <div class="user-info">
            <div class="user-avatar">
                <span>{{ username[0].upper() }}</span>
            </div>
            <div class="user-name">{{ username }}</div>
            <div class="user-role">
                {{ '教师' if role == 'teacher' else '学生' }}
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li class="{% if request.path == url_for('new_chat') %}active{% endif %}">
                    <a href="{{ url_for('new_chat') }}">
                        <span class="icon">💬</span>
                        <span class="label">开启新对话</span>
                    </a>
                </li>
                <li class="{% if request.path == url_for('course_agents') %}active{% endif %}">
                    <a href="{{ url_for('course_agents') }}">
                        <span class="icon">🤖</span>
                        <span class="label">课程广场</span>
                    </a>
                </li>
                <li class="{% if request.path == url_for('course_kd') %}active{% endif %}">
                    <a href="{{ url_for('course_kd') }}">
                        <span class="icon">🔍</span>
                        <span class="label">智能体广场</span>
                    </a>
                </li>

                <li class="{% if request.path == url_for('his') %}active{% endif %}">
                    <a href="{{ url_for('his') }}">
                        <span class="icon">📚</span>
                        <span class="label">个人知识库</span>
                    </a>
                </li>
                <li class="{% if request.path == url_for('chat') %}active{% endif %}">
                    <a href="{{ url_for('chat') }}">
                        <span class="icon">🎓</span>
                        <span class="label">学情分析</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a href="https://docs.qq.com/sheet/DRXZUZ1F1WGtOZ0dx?tab=BB08J2" 
               class="logout-btn" 
               target="_blank">
                <span class="icon">📝</span>
                <span class="label">意见反馈</span>
            </a>
        </div>
        <div class="sidebar-footer">
            <a href="{{ url_for('logout') }}" class="logout-btn">
                <span class="icon">🚪</span>
                <span class="label">退出登录</span>
            </a>
        </div>
    </div>
    
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <div class="page-header">
                <h1>学情分析</h1>
                <p>与学情AI助手深度交流，让教学决策精准高效</p>
        </div>
        <iframe 
            src="http://180.85.206.30:3000/chat/share?shareId=sCzcgKyulkLUCPvdLFZTe34m"
            frameborder="0"
            allowfullscreen
            loading="lazy"
            id="main-iframe"
        ></iframe>
    </div>
</div>

<style>
.main-content {
    flex: 1;
    background-color: #fff;
    overflow: auto;
}

#main-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}
</style>
{% endblock %}
